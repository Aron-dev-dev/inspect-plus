<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Persistent Editor with Live Preview</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>Persistent Editor</h1>\n        <div id="variable-manager">\n            <h2>Variable Manager</h2>\n            <!-- Variable management interface goes here -->\n        </div>\n        <div id="control-buttons">\n            <button id="save-button">Save</button>\n            <button id="load-button">Load</button>\n        </div>\n    </header>\n    <main>\n        <textarea id="editor" placeholder="Type your code here..."></textarea>\n        <div id="live-preview">\n            <h2>Live Preview</h2>\n            <div id="preview-area"></div>\n        </div>\n    </main>\n    <script src="script.js"></script>\n</body>\n</html>
